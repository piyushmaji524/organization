<script>
let _typeFilter = 'all', _yearFilter = '';

function buildGalleryItem(g) {
  const caption = I18N.field(g,'caption') || '';
  if (g.is_video && g.video_url) {
    const ytId = g.video_url.match(/(?:v=|\/embed\/|youtu\.be\/)([^&?/]+)/)?.[1];
    const thumb = ytId ? `https://img.youtube.com/vi/${ytId}/hqdefault.jpg` : '';
    return `<div class="gallery-item" onclick="window.open('${g.video_url}','_blank')">
      ${thumb?`<img src="${thumb}" alt="${caption}" loading="lazy">`:`<div style="height:200px;background:#000;display:flex;align-items:center;justify-content:center;font-size:48px">▶️</div>`}
      <div class="gallery-overlay">▶️</div>
    </div>`;
  }
  if (!g.image_path) return '';
  return `<div class="gallery-item" data-src="/${g.image_path}" data-caption="${caption}">
    <img src="/${g.image_path}" alt="${caption}" loading="lazy">
    <div class="gallery-overlay">🔍</div>
  </div>`;
}

async function loadGallery() {
  const grid = document.getElementById('gallery-grid');
  const empty = document.getElementById('gallery-empty');
  grid.innerHTML = '<div style="column-span:all;text-align:center;padding:40px"><div class="spinner" style="margin:0 auto"></div></div>';
  empty.style.display = 'none';

  const params = {};
  if (_typeFilter === 'photos')  params.video = 0;
  if (_typeFilter === 'videos')  params.video = 1;
  if (_yearFilter) params.year = _yearFilter;

  const res = await API.gallery(params);
  if (!res.success || !res.data.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  grid.innerHTML = res.data.map(buildGalleryItem).join('');

  // Populate year filter
  const ySel = document.getElementById('year-filter');
  if (ySel.options.length <= 1 && res.years?.length) {
    res.years.forEach(y => {
      const opt = document.createElement('option');
      opt.value = y; opt.textContent = y; ySel.appendChild(opt);
    });
  }
  initLightbox();
}

document.querySelectorAll('#type-filters .filter-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('#type-filters .filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    _typeFilter = pill.dataset.type;
    loadGallery();
  });
});

document.getElementById('year-filter').addEventListener('change', e => {
  _yearFilter = e.target.value;
  loadGallery();
});

async function initPage() {
  await loadGallery();
  const s = await getSettings();
  document.getElementById('footer-year').textContent = new Date().getFullYear();
  if (s.logo_path) { document.getElementById('nav-logo-img').src='/'+s.logo_path; document.getElementById('nav-logo-img').style.display='block'; document.getElementById('nav-logo-fallback').style.display='none'; }
  if (s.founding_year) document.getElementById('footer-founding').textContent = 'Est. ' + s.founding_year;
  const lang = I18N.getLang();
  if (s.contact_email) document.getElementById('footer-email').textContent = '✉ ' + s.contact_email;
  const addr = s[`contact_address_${lang}`]||s.contact_address_en||'';
  if (addr) document.getElementById('footer-address').textContent = addr;
  const sc=document.getElementById('footer-social');
  [{key:'facebook_url',icon:'📘'},{key:'instagram_url',icon:'📸'},{key:'youtube_url',icon:'▶️'},{key:'whatsapp_link',icon:'💬'}].forEach(({key,icon})=>{if(s[key])sc.innerHTML+=`<a href="${s[key]}" target="_blank">${icon}</a>`;});
}

document.addEventListener('DOMContentLoaded', initPage);
</script>
