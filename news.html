<script src="/assets/js/api.js"></script>
<script src="/assets/js/i18n.js"></script>
<script src="/assets/js/main.js"></script>
<script>
let _currentCat = '', _currentOffset = 0;
const LIMIT = 9;

function buildNewsCard(a) {
  const title = I18N.field(a, 'title');
  const cover = a.cover_image
    ? `<img src="/${a.cover_image}" alt="${title}" style="width:100%;height:180px;object-fit:cover">`
    : `<div style="height:180px;display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--gold-pale)">📰</div>`;
  const dateStr = a.published_at ? new Date(a.published_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '';
  return `
  <div class="card news-card reveal" onclick="loadArticle(${a.id})" style="cursor:pointer">
    <div class="news-cover">${cover}</div>
    <div class="news-body">
      <div class="news-cat">${I18N.t('news_category_'+a.category, a.category)}</div>
      <div class="news-title">${title}</div>
      <div class="news-date">📆 ${dateStr}</div>
    </div>
  </div>`;
}

async function loadNews(cat='', offset=0) {
  _currentCat=cat; _currentOffset=offset;
  const grid=document.getElementById('news-grid');
  grid.innerHTML='<div class="loading-block"><div class="spinner"></div></div>';
  const params={limit:LIMIT,offset};
  if(cat) params.category=cat;
  const res = await API.news(params);
  if(!res.success||!res.data.length){ grid.innerHTML='<p style="color:var(--text-muted);text-align:center;grid-column:1/-1">No articles found.</p>'; document.getElementById('news-pagination').innerHTML=''; return; }
  grid.innerHTML=res.data.map(buildNewsCard).join('');
  initScrollReveal();
  // Pagination
  const total=res.total||0; const pages=Math.ceil(total/LIMIT); const currentPage=Math.floor(offset/LIMIT);
  let pag=''; for(let i=0;i<pages;i++) pag+=`<button class="filter-pill${i===currentPage?' active':''}" onclick="loadNews('${cat}',${i*LIMIT})">${i+1}</button>`;
  document.getElementById('news-pagination').innerHTML=pag;
}

let _currentArticle = null;

function renderArticle(a) {
  const container=document.getElementById('article-content');
  const title=I18N.field(a,'title');
  const content=I18N.field(a,'content');
  const dateStr=a.published_at?new Date(a.published_at).toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'';
  container.innerHTML=`
    <a href="/news.html" class="btn btn-maroon btn-sm" style="margin-bottom:24px">← Back to News</a>
    ${a.cover_image?`<img src="/${a.cover_image}" alt="${title}" style="width:100%;max-height:380px;object-fit:cover;border-radius:14px;margin-bottom:24px">`:''}
    <div style="background:var(--gold-pale);display:inline-block;padding:3px 14px;border-radius:20px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--maroon);margin-bottom:12px">${I18N.t('news_category_'+a.category,a.category)}</div>
    <h1 style="font-size:clamp(22px,4vw,38px);margin-bottom:10px">${title}</h1>
    <p style="color:var(--text-muted);font-size:14px;margin-bottom:24px">📆 ${dateStr}</p>
    <div style="font-size:16px;line-height:1.9;color:var(--text)">${content?content.split('\n').map(p=>p.trim()?`<p style="margin-bottom:12px">${p}</p>`:'').join(''):'<p style="color:var(--text-muted)">Content not available.</p>'}</div>`;
}

async function loadArticle(id) {
  document.getElementById('news-list-section').style.display='none';
  document.getElementById('article-detail').style.display='block';
  const container=document.getElementById('article-content');
  container.innerHTML='<div class="loading-block"><div class="spinner"></div></div>';
  const res=await API.newsItem(id);
  if(!res.success){container.innerHTML='<p>Article not found.</p>';return;}
  _currentArticle=res.data;
  renderArticle(_currentArticle);
}

document.querySelectorAll('#news-filters .filter-pill').forEach(pill=>{
  pill.addEventListener('click',()=>{
    document.querySelectorAll('#news-filters .filter-pill').forEach(p=>p.classList.remove('active'));
    pill.classList.add('active');
    loadNews(pill.dataset.cat||'');
  });
});

async function initPage(){
  const params=new URLSearchParams(location.search);
  const id=params.get('id');
  if(id){await loadArticle(id);}
  else{await loadNews();}
  const s=await getSettings();
  document.getElementById('footer-year').textContent=new Date().getFullYear();
  if(s.logo_path){document.getElementById('nav-logo-img').src='/'+s.logo_path;document.getElementById('nav-logo-img').style.display='block';document.getElementById('nav-logo-fallback').style.display='none';}
  if(s.founding_year) document.getElementById('footer-founding').textContent='Est. '+s.founding_year;
  const lang=I18N.getLang();
  if(s.contact_email) document.getElementById('footer-email').textContent='✉ '+s.contact_email;
  const addr=s[`contact_address_${lang}`]||s.contact_address_en||'';
  if(addr) document.getElementById('footer-address').textContent=addr;
  const sc=document.getElementById('footer-social');
  [{key:'facebook_url',icon:'📘'},{key:'instagram_url',icon:'📸'},{key:'youtube_url',icon:'▶️'},{key:'whatsapp_link',icon:'💬'}].forEach(({key,icon})=>{if(s[key])sc.innerHTML+=`<a href="${s[key]}" target="_blank">${icon}</a>`;});
}

document.addEventListener('DOMContentLoaded',initPage);
document.addEventListener('langchange',()=>{
  if(_currentArticle) renderArticle(_currentArticle);
  else loadNews(_currentCat,_currentOffset);
});
</script>
